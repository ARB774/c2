<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Онлайн-калькулятор</title>
    <style>
      :root {
        --bg: #202a4a;
        --card: #1a2448;
        --text: #eaf0ff;
        --muted: rgba(234, 240, 255, 0.75);
        --border: rgba(234, 240, 255, 0.15);
        --accent: #6ea8fe;
        --danger: #ff6b6b;
        --key: rgba(234, 240, 255, 0.06);
        --key-hover: rgba(234, 240, 255, 0.12);
        --key-active: rgba(234, 240, 255, 0.18);
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
      }

      :root[data-theme="light"] {
        color-scheme: light;
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #0b1020;
        --muted: rgba(11, 16, 32, 0.7);
        --border: rgba(11, 16, 32, 0.12);
        --accent: #2f6fed;
        --danger: #d63447;
        --key: rgba(11, 16, 32, 0.06);
        --key-hover: rgba(11, 16, 32, 0.1);
        --key-active: rgba(11, 16, 32, 0.15);
      }

      @media (prefers-color-scheme: light) {
        :root:not([data-theme]) {
          color-scheme: light;
          --bg: #f6f7fb;
          --card: #ffffff;
          --text: #0b1020;
          --muted: rgba(11, 16, 32, 0.7);
          --border: rgba(11, 16, 32, 0.12);
          --accent: #2f6fed;
          --danger: #d63447;
          --key: rgba(11, 16, 32, 0.06);
          --key-hover: rgba(11, 16, 32, 0.1);
          --key-active: rgba(11, 16, 32, 0.15);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(1200px 700px at 20% 10%, rgba(110, 168, 254, 0.25), transparent 60%),
          radial-gradient(900px 600px at 90% 30%, rgba(255, 107, 107, 0.2), transparent 55%),
          var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        padding: 24px;
      }

      .app {
        width: min(760px, 100%);
        display: flex;
        gap: 16px;
        align-items: flex-start;
        justify-content: center;
      }

      @media (max-width: 760px) {
        .app {
          flex-direction: column;
          align-items: stretch;
        }
      }

      .calc {
        width: min(360px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 22px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        padding: 16px;
      }

      .history {
        width: min(360px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 22px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      .history-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .history-title {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.2px;
        color: var(--muted);
      }

      .history-clear {
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--key);
        color: var(--text);
        font: inherit;
        padding: 8px 12px;
        cursor: pointer;
        user-select: none;
      }

      .history-clear:hover {
        background: var(--key-hover);
      }

      .history-empty {
        color: var(--muted);
        font-size: 13px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px dashed var(--border);
      }

      .history-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 10px;
        max-height: 462px;
        overflow: auto;
      }

      .history-item {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--key);
        font-size: 14px;
        font-variant-numeric: tabular-nums;
        word-break: break-word;
      }

      .panel {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 6px 2px 10px;
      }

      .panel-title {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.2px;
        color: var(--muted);
      }

      .theme-toggle {
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--key);
        color: var(--text);
        font: inherit;
        padding: 8px 12px;
        cursor: pointer;
        user-select: none;
      }

      .theme-toggle:hover {
        background: var(--key-hover);
      }

      .display {
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.08);
        padding: 14px 14px 12px;
        min-height: 84px;
        display: grid;
        align-content: center;
        gap: 6px;
        overflow: hidden;
      }

      .display .mini {
        color: var(--muted);
        font-size: 13px;
        min-height: 18px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .display output {
        display: block;
        text-align: right;
        font-variant-numeric: tabular-nums;
        font-size: 34px;
        line-height: 1.1;
        letter-spacing: 0.2px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .keys {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      .key {
        height: 56px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: var(--key);
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-size: 18px;
        font-weight: 650;
        letter-spacing: 0.2px;
        user-select: none;
      }

      .key:hover {
        background: var(--key-hover);
      }

      .key:active {
        background: var(--key-active);
        transform: translateY(1px);
      }

      .key.util {
        color: var(--muted);
      }

      .key.ac {
        border-color: rgba(255, 107, 107, 0.6);
        background: rgba(255, 107, 107, 0.22);
        color: var(--text);
      }

      .key.ac:hover {
        background: rgba(255, 107, 107, 0.3);
      }

      .key.op {
        border-color: rgba(110, 168, 254, 0.35);
        background: rgba(110, 168, 254, 0.12);
      }

      .key.eq {
        border-color: rgba(110, 168, 254, 0.7);
        background: rgba(110, 168, 254, 0.28);
      }

      .key.eq:hover {
        background: rgba(110, 168, 254, 0.35);
      }

      .key.zero {
        grid-column: span 2;
      }

      .danger {
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <div class="app" aria-label="Приложение">
      <main class="calc" aria-label="Калькулятор">
        <header class="panel" aria-label="Панель">
          <div class="panel-title">Калькулятор</div>
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Переключить тему"></button>
        </header>

        <section class="display" aria-label="Экран">
          <div id="mini" class="mini" aria-hidden="true"></div>
          <output id="display" aria-label="Показания">0</output>
        </section>

        <section class="keys" aria-label="Кнопки">
          <button class="key util ac" type="button" data-action="clear">AC</button>
          <button class="key util" type="button" data-action="backspace">⌫</button>
          <button class="key util" type="button" data-action="noop"></button>
          <button class="key op" type="button" data-op="/">÷</button>

          <button class="key" type="button" data-digit="7">7</button>
          <button class="key" type="button" data-digit="8">8</button>
          <button class="key" type="button" data-digit="9">9</button>
          <button class="key op" type="button" data-op="*">×</button>

          <button class="key" type="button" data-digit="4">4</button>
          <button class="key" type="button" data-digit="5">5</button>
          <button class="key" type="button" data-digit="6">6</button>
          <button class="key op" type="button" data-op="-">−</button>

          <button class="key" type="button" data-digit="1">1</button>
          <button class="key" type="button" data-digit="2">2</button>
          <button class="key" type="button" data-digit="3">3</button>
          <button class="key op" type="button" data-op="+">+</button>

          <button class="key zero" type="button" data-digit="0">0</button>
          <button class="key" type="button" data-action="decimal">.</button>
          <button class="key eq" type="button" data-action="equals">=</button>
        </section>
      </main>

      <aside class="history" aria-label="Журнал операций">
        <header class="history-header">
          <div class="history-title">Журнал</div>
          <button id="historyClear" class="history-clear" type="button">Очистить</button>
        </header>
        <div id="historyEmpty" class="history-empty">Пока нет операций.</div>
        <ol id="historyList" class="history-list" aria-label="Список операций"></ol>
      </aside>
    </div>

    <script>
      const displayEl = document.getElementById("display");
      const miniEl = document.getElementById("mini");
      const keysEl = document.querySelector(".keys");
      const calcEl = document.querySelector(".calc");
      const themeToggleEl = document.getElementById("themeToggle");
      const rootEl = document.documentElement;
      const historyListEl = document.getElementById("historyList");
      const historyEmptyEl = document.getElementById("historyEmpty");
      const historyClearEl = document.getElementById("historyClear");

      const MAX_INPUT_LENGTH = 18;
      const HISTORY_LIMIT = 50;

      const state = {
        input: "0",
        stored: null,
        pendingOp: null,
        resetInput: false,
        lastOp: null,
        lastOperand: null,
        error: null,
        history: [],
      };

      function systemTheme() {
        return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      function updateThemeUI(theme) {
        themeToggleEl.textContent = theme === "dark" ? "Тема: тёмная" : "Тема: светлая";
      }

      function applyTheme(theme, persist) {
        rootEl.setAttribute("data-theme", theme);
        updateThemeUI(theme);
        if (persist) localStorage.setItem("theme", theme);
      }

      function normalizeInputString(s) {
        return String(s).replace(",", ".").trim();
      }

      function inputToNumber() {
        const normalized = normalizeInputString(state.input);
        if (normalized === "" || normalized === "-" || normalized === "." || normalized === "-.") return null;
        const num = Number(normalized);
        return Number.isFinite(num) ? num : null;
      }

      function formatNumber(n) {
        if (!Number.isFinite(n)) return "Ошибка";
        const rounded = Math.abs(n) < 1e15 ? Math.round(n * 1e12) / 1e12 : n;
        let s = String(rounded);
        if (s.includes("e") || s.includes("E")) {
          s = rounded.toFixed(12).replace(/\.?0+$/, "");
        }
        return s;
      }

      function opToSymbol(op) {
        if (op === "+") return "+";
        if (op === "-") return "−";
        if (op === "*") return "×";
        if (op === "/") return "÷";
        return op;
      }

      function renderHistory() {
        historyListEl.textContent = "";
        const hasEntries = state.history.length > 0;
        historyEmptyEl.style.display = hasEntries ? "none" : "block";
        historyListEl.style.display = hasEntries ? "grid" : "none";

        state.history.forEach((text) => {
          const li = document.createElement("li");
          li.className = "history-item";
          li.textContent = text;
          historyListEl.appendChild(li);
        });
      }

      function addHistoryEntry(left, op, right, result) {
        const text = `${formatNumber(left)} ${opToSymbol(op)} ${formatNumber(right)} = ${formatNumber(result)}`;
        state.history.unshift(text);
        if (state.history.length > HISTORY_LIMIT) state.history.length = HISTORY_LIMIT;
        renderHistory();
      }

      function updateUI() {
        if (state.error) {
          displayEl.textContent = state.error;
          displayEl.classList.add("danger");
        } else {
          displayEl.textContent = state.input;
          displayEl.classList.remove("danger");
        }

        const opSymbol =
          state.pendingOp === "+" ? "+" : state.pendingOp === "-" ? "−" : state.pendingOp === "*" ? "×" : state.pendingOp === "/" ? "÷" : "";
        miniEl.textContent = state.stored !== null && state.pendingOp ? `${formatNumber(state.stored)} ${opSymbol}` : "";
      }

      function clearAll() {
        state.input = "0";
        state.stored = null;
        state.pendingOp = null;
        state.resetInput = false;
        state.lastOp = null;
        state.lastOperand = null;
        state.error = null;
        updateUI();
      }

      function setError(message) {
        state.error = message;
        updateUI();
      }

      function appendDigit(digit) {
        if (state.error) clearAll();
        if (state.resetInput) {
          state.input = "0";
          state.resetInput = false;
        }

        if (state.input === "0") state.input = digit;
        else if (state.input === "-0") state.input = "-" + digit;
        else if (state.input.length < MAX_INPUT_LENGTH) state.input += digit;
        updateUI();
      }

      function appendDecimal() {
        if (state.error) clearAll();
        if (state.resetInput) {
          state.input = "0";
          state.resetInput = false;
        }
        if (!state.input.includes(".")) {
          state.input = state.input.length ? `${state.input}.` : "0.";
          updateUI();
        }
      }

      function backspace() {
        if (state.error) {
          clearAll();
          return;
        }
        if (state.resetInput) return;
        if (state.input.length <= 1 || (state.input.length === 2 && state.input.startsWith("-"))) {
          state.input = "0";
        } else {
          state.input = state.input.slice(0, -1);
        }
        updateUI();
      }

      function compute(op, a, b) {
        switch (op) {
          case "+":
            return a + b;
          case "-":
            return a - b;
          case "*":
            return a * b;
          case "/":
            if (b === 0) return null;
            return a / b;
          default:
            return null;
        }
      }

      function pressOperator(op) {
        if (state.error) return;
        const current = inputToNumber();
        if (current === null) return;

        if (state.pendingOp && state.stored !== null && !state.resetInput) {
          const result = compute(state.pendingOp, state.stored, current);
          if (result === null) {
            setError("Ошибка");
            return;
          }
          state.stored = result;
          state.input = formatNumber(result);
        } else if (state.stored === null) {
          state.stored = current;
        }

        state.pendingOp = op;
        state.resetInput = true;
        state.lastOp = null;
        state.lastOperand = null;
        updateUI();
      }

      function pressEquals() {
        if (state.error) return;

        const current = inputToNumber();
        if (current === null) return;

        let op = state.pendingOp;
        let left = state.stored;
        let right = current;

        if (!op || left === null) {
          if (state.lastOp && state.lastOperand !== null) {
            op = state.lastOp;
            left = current;
            right = state.lastOperand;
          } else {
            state.input = formatNumber(current);
            updateUI();
            return;
          }
        }

        const result = compute(op, left, right);
        if (result === null) {
          setError("Ошибка");
          return;
        }

        addHistoryEntry(left, op, right, result);
        state.input = formatNumber(result);
        state.stored = result;
        state.pendingOp = null;
        state.resetInput = true;
        state.lastOp = op;
        state.lastOperand = right;
        updateUI();
      }

      function handleKeyPress(key) {
        if (key >= "0" && key <= "9") return appendDigit(key);
        if (key === "." || key === ",") return appendDecimal();
        if (key === "+" || key === "-" || key === "*" || key === "/") return pressOperator(key);
        if (key === "Enter" || key === "=") return pressEquals();
        if (key === "Backspace") return backspace();
        if (key === "Escape") return clearAll();
      }

      keysEl.addEventListener("click", (e) => {
        const button = e.target.closest("button");
        if (!button) return;

        const digit = button.dataset.digit;
        const op = button.dataset.op;
        const action = button.dataset.action;

        if (digit) return appendDigit(digit);
        if (op) return pressOperator(op);
        if (action === "decimal") return appendDecimal();
        if (action === "equals") return pressEquals();
        if (action === "clear") return clearAll();
        if (action === "backspace") return backspace();
      });

      themeToggleEl.addEventListener("click", () => {
        const current = rootEl.getAttribute("data-theme") || systemTheme();
        const next = current === "dark" ? "light" : "dark";
        applyTheme(next, true);
        calcEl.focus();
      });

      historyClearEl.addEventListener("click", () => {
        state.history = [];
        renderHistory();
        calcEl.focus();
      });

      calcEl.addEventListener("keydown", (e) => {
        if (e.target === themeToggleEl) return;
        const blocked = ["Tab", "Shift", "Control", "Alt", "Meta", "CapsLock", "ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"];
        if (blocked.includes(e.key)) return;
        e.preventDefault();
        handleKeyPress(e.key);
      });

      calcEl.tabIndex = 0;
      const savedTheme = localStorage.getItem("theme");
      const initialTheme = savedTheme === "dark" || savedTheme === "light" ? savedTheme : systemTheme();
      applyTheme(initialTheme, false);
      clearAll();
      renderHistory();
    </script>
  </body>
</html>
